
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>
TKBI v3 OJK Explorer - created by Leonard Tiopan Panjaitan, MT, CSRA, CGPS, CPS - March 2026
</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

header{
background:#1b5e20;
color:white;
padding:20px;
font-size:20px;
font-weight:bold;
}

.container{
display:flex;
height:calc(100vh - 70px);
}

.sidebar{
width:280px;
background:white;
border-right:1px solid #ddd;
overflow:auto;
padding:15px;
}

.main{
flex:1;
overflow:auto;
padding:20px;
}

.sektor-item{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.sektor-item:hover{
background:#f1f8e9;
}

.activity{
background:white;
padding:15px;
margin-bottom:10px;
border-left:4px solid #2e7d32;
border-radius:5px;
}

.pertanyaan{
background:#fafafa;
padding:10px;
margin-top:10px;
border-radius:5px;
}

.kriteria{
margin-left:20px;
}

.social{
background:#e3f2fd;
padding:10px;
margin-top:10px;
border-radius:5px;
}

.search{
width:100%;
padding:8px;
margin-bottom:10px;
}

button{
margin-top:10px;
}

</style>

</head>

<body>

<header>
TKBI v3 OJK Explorer - created by Leonard Tiopan Panjaitan, MT, CSRA, CGPS, CPS - March 2026
</header>

<div class="container">

<div class="sidebar">

<input id="search" class="search" placeholder="Cari KBLI / Aktivitas">

<div id="sektorList"></div>

</div>

<div class="main">

<div id="content">
Memuat data TKBI...
</div>

</div>

</div>

<script>

////////////////////////////////////////////////////////
// CLEAR CACHE
////////////////////////////////////////////////////////

if ('caches' in window) {
caches.keys().then(names => {
for (let name of names) caches.delete(name)
})
}

////////////////////////////////////////////////////////
// LOAD XML ZIP
////////////////////////////////////////////////////////

fetch("TKBI.xml.zip?nocache=" + Date.now())
.then(res => res.arrayBuffer())
.then(data => JSZip.loadAsync(data))
.then(zip => zip.file("TKBI.xml").async("text"))
.then(xmlText => {

const parser = new DOMParser()
const xml = parser.parseFromString(xmlText,"text/xml")

initExplorer(xml)

})

////////////////////////////////////////////////////////
// INITIALIZE
////////////////////////////////////////////////////////

let xmlData

function initExplorer(xml){

xmlData = xml

const sektor = xml.getElementsByTagName("Sektor")
const sektorList = document.getElementById("sektorList")

for(let s of sektor){

let nama = s.getElementsByTagName("Nama")[0]?.textContent

let div = document.createElement("div")
div.className="sektor-item"
div.textContent=nama

div.onclick = () => showSektor(s)

sektorList.appendChild(div)

}

document.getElementById("content").innerHTML="Pilih sektor di sebelah kiri."

}

////////////////////////////////////////////////////////
// SHOW SEKTOR
////////////////////////////////////////////////////////

function showSektor(sektorNode){

const content = document.getElementById("content")
content.innerHTML=""

const sektorNama = sektorNode.getElementsByTagName("Nama")[0]?.textContent

let title = document.createElement("h2")
title.textContent=sektorNama

content.appendChild(title)

const tscList = sektorNode.getElementsByTagName("TSC")

for(let tscNode of tscList){

let kode = tscNode.getElementsByTagName("Kode")[0]?.textContent
let nama = tscNode.getElementsByTagName("NamaKBLI")[0]?.textContent
let klasifikasi = tscNode.getElementsByTagName("Klasifikasi")[0]?.textContent

if(!kode) continue

let activity = document.createElement("div")
activity.className="activity"

activity.innerHTML = `
<b>${nama}</b><br>
Kode TSC : ${kode}<br>
Klasifikasi : ${klasifikasi}
`

////////////////////////////////////////////////////////
// PERTANYAAN
////////////////////////////////////////////////////////

let pertanyaan = tscNode.getElementsByTagName("Pertanyaan")

for(let p of pertanyaan){

let text = p.getElementsByTagName("Text")[0]?.textContent

let div = document.createElement("div")
div.className="pertanyaan"

div.innerHTML="<b>Pertanyaan:</b> "+text

let kriteria = p.getElementsByTagName("Kriteria")

for(let k of kriteria){

let ktext = k.getElementsByTagName("Text")[0]?.textContent

let kr = document.createElement("div")
kr.className="kriteria"

kr.innerHTML="• "+ktext

div.appendChild(kr)

}

activity.appendChild(div)

}

////////////////////////////////////////////////////////
// ASPEK SOSIAL
////////////////////////////////////////////////////////

let sosial = sektorNode.getElementsByTagName("AspekSosial")

if(sosial.length>0){

let socialDiv = document.createElement("div")
socialDiv.className="social"

socialDiv.innerHTML="<b>Aspek Sosial:</b>"

let pilar = sosial[0].getElementsByTagName("NamaPilar")

for(let p of pilar){

let line = document.createElement("div")
line.innerHTML="• "+p.textContent

socialDiv.appendChild(line)

}

activity.appendChild(socialDiv)

}

content.appendChild(activity)

}

}

////////////////////////////////////////////////////////
// SEARCH
////////////////////////////////////////////////////////

document.getElementById("search").addEventListener("keyup", function(){

let keyword = this.value.toLowerCase()

let items = document.querySelectorAll(".sektor-item")

items.forEach(i=>{

if(i.innerText.toLowerCase().includes(keyword))
i.style.display="block"
else
i.style.display="none"

})

})

</script>

</body>
</html>
