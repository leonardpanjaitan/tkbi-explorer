<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>
TKBI v3 OJK Explorer - created by Leonard Tiopan Panjaitan, MT, CSRA, CGPS, CPS - March 2026
</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

header{
background:#1b5e20;
color:white;
padding:18px;
font-size:18px;
font-weight:bold;
}

.container{
display:flex;
height:calc(100vh - 65px);
}

.sidebar{
width:300px;
background:white;
border-right:1px solid #ddd;
overflow:auto;
padding:15px;
}

.main{
flex:1;
overflow:auto;
padding:25px;
}

.sektor{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.sektor:hover{
background:#f1f8e9;
}

.activity{
background:white;
padding:15px;
margin-bottom:10px;
border-left:4px solid #2e7d32;
border-radius:5px;
}

.pertanyaan{
background:#fafafa;
padding:10px;
margin-top:10px;
border-radius:5px;
}

.kriteria{
margin-left:20px;
}

.search{
width:100%;
padding:8px;
margin-bottom:10px;
}

.filter{
margin-bottom:15px;
}

</style>

</head>

<body>

<header>
TKBI v3 OJK Explorer - created by Leonard Tiopan Panjaitan, MT, CSRA, CGPS, CPS - March 2026
</header>

<div class="container">

<div class="sidebar">

<input id="search" class="search" placeholder="Cari KBLI / Aktivitas">

<div class="filter">

<label><input type="checkbox" id="hijau" checked> Hijau</label><br>
<label><input type="checkbox" id="transisi" checked> Transisi</label>

</div>

<h4>Sektor</h4>

<div id="sektorList"></div>

<h4>Prinsip</h4>

<div class="sektor" onclick="navigate('dnsh')">DNSH</div>
<div class="sektor" onclick="navigate('aspek-sosial')">Aspek Sosial</div>

</div>

<div class="main">

<div id="content">Memuat TKBI...</div>

</div>

</div>

<script>

////////////////////////////////////////////////////
//// CLEAR CACHE
////////////////////////////////////////////////////

if ('caches' in window) {
caches.keys().then(names=>{
for (let name of names) caches.delete(name)
})
}

////////////////////////////////////////////////////
//// GLOBAL VARIABLE
////////////////////////////////////////////////////

let xmlData

////////////////////////////////////////////////////
//// LOAD XML ZIP
////////////////////////////////////////////////////

fetch("TKBI.xml.zip?nocache=" + Date.now())
.then(res=>res.arrayBuffer())
.then(data=>JSZip.loadAsync(data))
.then(zip=>zip.file("TKBI.xml").async("text"))
.then(xmlText=>{

const parser = new DOMParser()
xmlData = parser.parseFromString(xmlText,"text/xml")

initExplorer()

})

////////////////////////////////////////////////////
//// INITIALIZE SIDEBAR
////////////////////////////////////////////////////

function initExplorer(){

const sektorList=document.getElementById("sektorList")

const sektorNodes=xmlData.getElementsByTagName("Sektor")

for(let s of sektorNodes){

let nama=s.getElementsByTagName("Nama")[0]?.textContent

if(!nama) continue

let div=document.createElement("div")
div.className="sektor"
div.innerText=nama

div.onclick=()=>navigate(nama.toLowerCase())

sektorList.appendChild(div)

}

route()

}

////////////////////////////////////////////////////
//// ROUTER
////////////////////////////////////////////////////

function navigate(path){

history.pushState({}, "", path)

route()

}

window.onpopstate=route

function route(){

let path=window.location.pathname.split("/").pop()

if(path=="dnsh") showDNSH()
else if(path=="aspek-sosial") showSocial()
else showSektor(path)

}

////////////////////////////////////////////////////
//// SHOW SEKTOR
////////////////////////////////////////////////////

function showSektor(path){

const content=document.getElementById("content")

const sektorNodes=Array.from(xmlData.getElementsByTagName("Sektor"))

let sektor=sektorNodes.find(s=>{

let nama=s.getElementsByTagName("Nama")[0]?.textContent

return nama && nama.toLowerCase()==path

})

if(!sektor){

content.innerHTML="Pilih sektor di sidebar."
return

}

let namaSektor=sektor.getElementsByTagName("Nama")[0].textContent

content.innerHTML="<h2>"+namaSektor+"</h2>"

let tscParent=sektor.getElementsByTagName("TSC")[0]

if(!tscParent) return

let tscList=tscParent.getElementsByTagName("TSC")

const hijau=document.getElementById("hijau").checked
const transisi=document.getElementById("transisi").checked

for(let t of tscList){

let kode=t.getElementsByTagName("Kode")[0]?.textContent
let namaKBLI=t.getElementsByTagName("NamaKBLI")[0]?.textContent
let klasifikasi=t.getElementsByTagName("Klasifikasi")[0]?.textContent

if(!kode) continue

if(klasifikasi=="Hijau" && !hijau) continue
if(klasifikasi=="Transisi" && !transisi) continue

let div=document.createElement("div")
div.className="activity"

div.innerHTML="<b>"+namaKBLI+"</b><br>Kode TSC: "+kode+"<br>Klasifikasi: "+klasifikasi

////////////////////////////////////////////////////
//// PERTANYAAN
////////////////////////////////////////////////////

let pertanyaan=t.getElementsByTagName("Pertanyaan")

for(let p of pertanyaan){

let text=p.getElementsByTagName("Text")[0]?.textContent

let pdiv=document.createElement("div")
pdiv.className="pertanyaan"

pdiv.innerHTML="<b>Pertanyaan:</b> "+text

let kriteria=p.getElementsByTagName("Kriteria")

for(let k of kriteria){

let ktext=k.getElementsByTagName("Text")[0]?.textContent

let kdiv=document.createElement("div")
kdiv.className="kriteria"
kdiv.innerHTML="• "+ktext

pdiv.appendChild(kdiv)

}

div.appendChild(pdiv)

}

content.appendChild(div)

}

}

////////////////////////////////////////////////////
//// SHOW DNSH
////////////////////////////////////////////////////

function showDNSH(){

const content=document.getElementById("content")

content.innerHTML="<h2>DNSH</h2>"

let sektorNodes=xmlData.getElementsByTagName("Sektor")

for(let s of sektorNodes){

let dnshParent=s.getElementsByTagName("DNSH")[0]

if(!dnshParent) continue

let dnshList=dnshParent.getElementsByTagName("DNSH")

for(let d of dnshList){

let nama=d.getElementsByTagName("Nama")[0]?.textContent

let div=document.createElement("div")
div.className="activity"

div.innerHTML="<b>"+nama+"</b>"

content.appendChild(div)

}

}

}

////////////////////////////////////////////////////
//// SHOW SOCIAL
////////////////////////////////////////////////////

function showSocial(){

const content=document.getElementById("content")

content.innerHTML="<h2>Aspek Sosial</h2>"

let sosial=xmlData.getElementsByTagName("AspekSosial")

if(!sosial.length) return

let pilar=sosial[0].getElementsByTagName("NamaPilar")

for(let p of pilar){

let div=document.createElement("div")
div.className="activity"

div.innerHTML="• "+p.textContent

content.appendChild(div)

}

}

////////////////////////////////////////////////////
//// SEARCH
////////////////////////////////////////////////////

document.getElementById("search").addEventListener("keyup",function(){

let keyword=this.value.toLowerCase()

let sektor=document.querySelectorAll(".sektor")

sektor.forEach(s=>{

if(s.innerText.toLowerCase().includes(keyword))
s.style.display="block"
else
s.style.display="none"

})

})

</script>

</body>
</html>
